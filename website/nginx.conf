server {
    listen 80;
    listen [::]:80;
    server_name 4kub.ru www.4kub.ru;

    # Certbot will insert the SSL redirect here.
    # After running certbot --nginx it will add a 301 redirect to HTTPS
    # and create a second server block for 443.

    root /var/www/4kub;
    index index.html;

    # Proxy all API calls to the Fastify backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve HTML pages without .html extension:
    #   /register  → register.html
    #   /verify    → verify.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
